server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Match vercel.json: root redirects to /en/
  location = / {
    return 302 /en/;
  }

  # Astro builds with trailingSlash: 'always' — serve dir/index.html
  location / {
    try_files $uri $uri/ $uri/index.html $uri.html =404;
  }

  # Long-cache immutable hashed assets
  location /_assets/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  # Pagefind search index
  location /pagefind/ {
    expires 1h;
    add_header Cache-Control "public";
  }

  # Gzip text assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
}
