apiVersion: v1
kind: Namespace
metadata:
  name: config-wiki-staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-wiki
  namespace: config-wiki-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-wiki
  template:
    metadata:
      labels:
        app: config-wiki
    spec:
      containers:
        - name: config-wiki
          image: 586794481034.dkr.ecr.us-west-2.amazonaws.com/config-wiki:staging
          ports:
            - containerPort: 80
          imagePullPolicy: Always
          readinessProbe:
            httpGet:
              path: /en/
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /en/
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: config-wiki
  namespace: config-wiki-staging
spec:
  selector:
    app: config-wiki
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
