name: Deploy Wiki to GitHub Pages (disabled — superseded by deploy-eks.yml)
on:
  # Disabled after transfer to configint org: repo is now private, GH Pages
  # deploy is replaced by EKS + Tailscale. Left as workflow_dispatch-only in
  # case we ever want to publish a public snapshot again.
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Opt-in to Node.js 24 for JavaScript actions (GitHub will default to 24).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiki-site/package.json
      - run: npm install
        working-directory: wiki-site
      - run: npm run build
        working-directory: wiki-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: wiki-site/dist
      - id: deploy
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'
