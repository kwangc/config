name: Deploy to EKS (Tailscale)

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'wiki-site/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.dockerignore'
      - 'k8s/**'
      - '.github/workflows/deploy-eks.yml'
  workflow_dispatch:

concurrency:
  group: deploy-eks
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 586794481034.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: config-wiki
  EKS_CLUSTER: dev-shared-eks
  NAMESPACE: config-wiki-staging
  DEPLOYMENT: config-wiki
  # Opt into Node 24 runtime for JS actions (default June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # copy-wiki.js reads `git log` for lastModified frontmatter

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::586794481034:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:staging
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Rollout restart
        run: kubectl -n ${{ env.NAMESPACE }} rollout restart deployment/${{ env.DEPLOYMENT }}

      - name: Wait for rollout
        run: kubectl -n ${{ env.NAMESPACE }} rollout status deployment/${{ env.DEPLOYMENT }} --timeout=180s
